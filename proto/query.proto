syntax = "proto3";

package instgraph.query.v1;

option go_package = "github.com/walkerfunction/instgraph/proto/querypb";

service QueryService {
  rpc Cypher(CypherRequest) returns (QueryResponse);
  rpc NaturalLanguage(NLRequest) returns (NLResponse);
}

message CypherRequest {
  string query = 1;
}

message QueryResponse {
  repeated string columns = 1;
  repeated Row rows = 2;
}

message Row {
  map<string, string> values = 1;
}

message NLRequest {
  string question = 1;
}

message NLResponse {
  string generated_cypher = 1;
  QueryResponse results = 2;
}
